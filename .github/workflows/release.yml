name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # 🚀 Step 1: Check & Update Version
  version_check:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'parveenkumar94123'
    outputs:
      new_version: ${{ steps.get_version.outputs.VERSION }}
      tag_created: ${{ steps.tag_check.outputs.TAG_CREATED }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Get current package version
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Check if version exists on npm
        id: check_version
        run: |
          if npm view flexifyui@$VERSION > /dev/null 2>&1; then
            echo "VERSION_EXISTS=true" >> $GITHUB_ENV
          else
            echo "VERSION_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Bump version if it exists
        if: env.VERSION_EXISTS == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore(release): Bump version to %s"
          echo "NEW_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Check if tag exists
        id: tag_check
        run: |
          git fetch --tags
          if git rev-parse "v${{ env.NEW_VERSION }}" >/dev/null 2>&1; then
            echo "TAG_CREATED=false" >> $GITHUB_ENV
          else
            echo "TAG_CREATED=true" >> $GITHUB_ENV
          fi

      - name: Push updated version and tag
        if: env.TAG_CREATED == 'true'
        run: |
          git add package.json
          git commit -m "chore(release): Bump version to $NEW_VERSION" || echo "No changes to commit"
          git tag v$NEW_VERSION
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/parveenkumar94123/flexifyui.git main --tags

  # 🚀 Step 2: Build Job (Only if version was updated)
  build:
    needs: version_check
    if: github.repository_owner == 'parveenkumar94123' && needs.version_check.outputs.tag_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build

      - name: Save build artifacts (dist, node_modules, package-lock.json)
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            dist
            node_modules
            package-lock.json

  # 🚀 Step 3: Release Job (Runs only after successful build)
  release:
    needs: build
    if: github.repository_owner == 'parveenkumar94123'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: ./

      - name: Verify build contents
        run: ls -R dist || echo "Build artifact not found!"

      - name: Verify package contents
        run: |
          npm pack
          tar -tzf flexifyui-*.tgz | grep validator || (echo "❌ Validator not found in package!" && exit 1)

      - name: Authenticate with npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          repository: "parveenkumar94123/flexifyui"
          tag_name: v${{ needs.version_check.outputs.new_version }}
          name: Release v${{ needs.version_check.outputs.new_version }}
          body: "Automated release for version ${{ needs.version_check.outputs.new_version }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
